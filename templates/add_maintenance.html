{% extends "base.html" %}

{% block title %}Add Maintenance - {{ vehicle.name }}{% endblock %}

{% block content %}
<div class="fade-in">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
        <h1>Log <span style="color: var(--primary);">Maintenance</span></h1>
        <a href="{{ url_for('vehicle.details', id=vehicle.id) }}" class="btn btn-outline">Cancel</a>
    </div>

    <div class="glass-card" style="max-width: 600px; margin: 0 auto;">
        <h3 style="margin-bottom: 1.5rem; color: var(--text-muted);">Vehicle: {{ vehicle.name }} ({{ vehicle.registration_number }})</h3>
        
        <form action="{{ url_for('maintenance.add_record', vehicle_id=vehicle.id) }}" method="POST">
            <div class="form-group">
                <label class="form-label">Service Type</label>
                <select name="service_type" class="form-input">
                    <option value="Oil change">Oil change</option>
                    <option value="General service">General service</option>
                    <option value="Brake check">Brake check</option>
                    <option value="Tire replacement">Tire replacement</option>
                    <option value="Battery replacement">Battery replacement</option>
                    <option value="Engine check">Engine check</option>
                    <option value="Coolant replacement">Coolant replacement</option>
                    <option value="Chain lubrication">Chain lubrication</option>
                </select>
            </div>
            
            <div class="form-group">
                <label class="form-label">Service Date</label>
                <input type="date" name="service_date" class="form-input" required>
            </div>

            <div class="form-group">
                <label class="form-label">Odometer Reading (KM)</label>
                <input type="number" name="odometer_reading" class="form-input" value="{{ vehicle.current_odometer }}" required>
            </div>

            <div class="form-group">
                <label class="form-label">Service Cost ($)</label>
                <input type="number" step="0.01" name="cost" class="form-input" placeholder="0.00" required>
            </div>

            <div class="form-group">
                <label class="form-label">Notes / Details</label>
                <textarea name="notes" class="form-input" rows="3" placeholder="Parts replaced, specific issues found..."></textarea>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; padding: 0.8rem;">
                <i class="fas fa-check-circle"></i> Save Maintenance Record
            </button>
        </form>
    </div>
</div>
{% endblock %}
