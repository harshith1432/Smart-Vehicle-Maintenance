{% extends "base.html" %}

{% block title %}Edit Vehicle - SVM{% endblock %}

{% block content %}
<div class="fade-in">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
        <h1>Edit <span style="color: var(--primary);">Vehicle</span></h1>
        <a href="{{ url_for('vehicle.details', id=vehicle.id) }}" class="btn btn-outline">Cancel</a>
    </div>

    <div class="glass-card" style="max-width: 800px;">
        <form action="{{ url_for('vehicle.edit_vehicle', id=vehicle.id) }}" method="POST">
            <div class="dashboard-grid">
                <div class="form-group">
                    <label class="form-label">Vehicle Name</label>
                    <input type="text" name="name" class="form-input" value="{{ vehicle.name }}" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Brand</label>
                    <input type="text" name="brand" class="form-input" value="{{ vehicle.brand }}" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Model</label>
                    <input type="text" name="model" class="form-input" value="{{ vehicle.model }}" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Vehicle Type</label>
                    <select name="vehicle_type" class="form-input">
                        <option value="Car" {% if vehicle.vehicle_type == 'Car' %}selected{% endif %}>Car</option>
                        <option value="Bike" {% if vehicle.vehicle_type == 'Bike' %}selected{% endif %}>Bike</option>
                        <option value="Scooter" {% if vehicle.vehicle_type == 'Scooter' %}selected{% endif %}>Scooter</option>
                        <option value="Truck" {% if vehicle.vehicle_type == 'Truck' %}selected{% endif %}>Truck</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Current Odometer (KM)</label>
                    <input type="number" name="current_odometer" class="form-input" value="{{ vehicle.current_odometer }}" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Fuel Type</label>
                    <select name="fuel_type" class="form-input">
                        <option value="Petrol" {% if vehicle.fuel_type == 'Petrol' %}selected{% endif %}>Petrol</option>
                        <option value="Diesel" {% if vehicle.fuel_type == 'Diesel' %}selected{% endif %}>Diesel</option>
                        <option value="Electric" {% if vehicle.fuel_type == 'Electric' %}selected{% endif %}>Electric</option>
                        <option value="Hybrid" {% if vehicle.fuel_type == 'Hybrid' %}selected{% endif %}>Hybrid</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Avg. Mileage (km/l)</label>
                    <input type="number" step="0.1" name="average_mileage" class="form-input" value="{{ vehicle.average_mileage }}">
                </div>
            </div>
            
            <div style="margin-top: 2rem;">
                <button type="submit" class="btn btn-primary" style="padding: 0.8rem 2rem;">
                    Update Vehicle
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
